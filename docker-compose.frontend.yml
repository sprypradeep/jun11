
# Frontend development configuration
# Usage: docker-compose -f docker-compose.frontend.yml up -d
#
# Note: Backend must be running first (docker-compose up -d)
# Frontend connects to backend via host network

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are baked into the browser bundle at build time. The
        # browser runs on the host, so it reaches the backend on localhost.
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_WS_URL=ws://localhost:8000
        - NEXT_PUBLIC_SITE_URL=http://localhost:3000
        - NEXT_PUBLIC_MAX_UPLOAD_SIZE_MB=50
        - NEXT_PUBLIC_OAUTH_PROVIDERS=google
        - NEXT_PUBLIC_RAG_ENABLED=false
    container_name: proj2_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://host.docker.internal:8000
      - BACKEND_WS_URL=ws://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      # The oven/bun image has no curl/wget, so probe with bun's built-in fetch.
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1), () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
