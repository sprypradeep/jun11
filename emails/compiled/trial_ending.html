<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Trial Ending</title></head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
<table width="100%" cellpadding="0" cellspacing="0"><tr><td align="center" style="padding:40px 16px">
<table width="560" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;overflow:hidden">
<tr><td style="background:#d97706;padding:32px;text-align:center"><span style="color:#fff;font-size:22px;font-weight:700">[[app_name]]</span></td></tr>
<tr><td style="padding:40px 40px 32px">
  <h1 style="margin:0 0 16px;font-size:24px;color:#d97706">Trial ends in [[days_left]] days</h1>
  <p style="margin:0 0 8px;color:#475569;line-height:1.6">Hi [[name]],</p>
  <p style="margin:0 0 24px;color:#475569;line-height:1.6">Your free trial of [[app_name]] ends in <strong>[[days_left]] days</strong>. Upgrade now to keep full access to all features.</p>
  <a href="[[upgrade_url]]" style="display:inline-block;background:#d97706;color:#fff;text-decoration:none;padding:12px 28px;border-radius:6px;font-weight:600;font-size:15px">Upgrade Now</a>
</td></tr>
<tr><td style="padding:24px 40px;border-top:1px solid #e2e8f0;color:#94a3b8;font-size:13px">[[app_name]] — trial reminder</td></tr>
</table>
</td></tr></table>
</body></html>
